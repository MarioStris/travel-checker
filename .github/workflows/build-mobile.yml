name: Build Mobile (EAS)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "all"
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production

# Only one EAS build runs at a time per branch
concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Build via EAS
  # ---------------------------------------------------------------------------
  build:
    name: "EAS Build (${{ inputs.profile }} / ${{ inputs.platform }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.profile == 'production' && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --force

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Write .env for the mobile app
      - name: Write mobile .env
        run: |
          cat <<EOF > apps/mobile/.env
          EXPO_PUBLIC_API_URL=${{ secrets.API_BASE_URL }}
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }}
          EOF

      - name: EAS Build
        working-directory: apps/mobile
        run: |
          eas build \
            --profile "${{ inputs.profile }}" \
            --platform "${{ inputs.platform }}" \
            --non-interactive \
            --no-wait

  # ---------------------------------------------------------------------------
  # Submit to stores (production builds only)
  # ---------------------------------------------------------------------------
  submit-ios:
    name: Submit iOS to App Store / TestFlight
    runs-on: ubuntu-latest
    needs: build
    if: inputs.profile == 'production' && (inputs.platform == 'ios' || inputs.platform == 'all')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --force

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit iOS build
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform ios \
            --latest \
            --non-interactive
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}

  submit-android:
    name: Submit Android to Google Play
    runs-on: ubuntu-latest
    needs: build
    if: inputs.profile == 'production' && (inputs.platform == 'android' || inputs.platform == 'all')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --force

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit Android build
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform android \
            --latest \
            --non-interactive

  # ---------------------------------------------------------------------------
  # Notifications
  # ---------------------------------------------------------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, submit-ios, submit-android]
    if: always()

    steps:
      - name: Notify on success
        if: needs.build.result == 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":iphone: *Travel Checker Mobile* EAS build completed.\n Profile: `${{ inputs.profile }}` | Platform: `${{ inputs.platform }}` | Branch: `${{ github.ref_name }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify on failure
        if: needs.build.result == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Travel Checker Mobile* EAS build *FAILED*.\n Profile: `${{ inputs.profile }}` | Platform: `${{ inputs.platform }}` | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
