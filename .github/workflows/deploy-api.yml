name: Deploy API to Railway

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Only one deployment runs at a time
concurrency:
  group: deploy-api-production
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RAILWAY_SERVICE: "@travel-checker/api"

jobs:
  # ---------------------------------------------------------------------------
  # Gate: only deploy if CI passed
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --force

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      # Run migrations against the production DB (direct connection, no pooler)
      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

      # Deploy via Railway CLI
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service=${{ env.RAILWAY_SERVICE }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # Wait for Railway to bring up the new deployment
      - name: Wait for deployment to stabilise
        run: sleep 30

      - name: Health check
        id: health
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -sfL -o /dev/null -w "%{http_code}" \
              "${{ secrets.API_BASE_URL }}/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "status=$STATUS" >> "$GITHUB_OUTPUT"
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "Health check failed after 3 attempts"
          exit 1

      # ---------------------------------------------------------------------------
      # Rollback on failure
      # ---------------------------------------------------------------------------
      - name: Rollback on failure
        if: failure() && steps.health.conclusion == 'failure'
        run: |
          echo "Health check failed — check Railway dashboard for deployment status"
          echo "Manual rollback may be needed via Railway dashboard"

      # ---------------------------------------------------------------------------
      # Notify on success (Slack)
      - name: Deploy summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deploy successful!"
          else
            echo "Deploy failed — check logs above"
          fi
