version: "3.9"

# =============================================================================
# Travel Checker — Production-like local stack
# Usage: docker compose -f infra/docker/docker-compose.yml up --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API service (production build)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    image: travel-checker-api:local
    container_name: travel-checker-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/travel_checker
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_placeholder}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-travel-checker-photos}
      R2_CDN_URL: ${R2_CDN_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - travel-checker-net

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: travel-checker-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: travel_checker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travel_checker"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - travel-checker-net

volumes:
  postgres_data:
    driver: local

networks:
  travel-checker-net:
    driver: bridge
